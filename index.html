<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GloGeGo</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel2:#1d2230;
      --line:#2a3141;
      --text:#e8ecf5;
      --muted:#9aa6bd;
      --accent:#6ea8fe;
      --accent2:#8b5cf6;
      --bubble:#202636;
      --bubble2:#26304a;
      --shadow:0 16px 50px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    html, body{
      height:100%;
      overflow:hidden;
    }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top, #1b2140 0, var(--bg) 45%);
      color:var(--text);
      min-height:100vh;
    }

    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .card{
      width:min(1360px,100%);
      height:100vh;
      background:rgba(17,20,29,.92);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(12px);
      position:relative;
    }

    .login{
      max-width:520px;
      padding:28px;
      margin:auto;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .title{
      font-size:34px;
      margin:0 0 8px;
      letter-spacing:.2px;
      text-align:center;
    }

    .subtitle{
      color:var(--muted);
      margin:0 0 24px;
      line-height:1.5;
      text-align:center;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:16px;
    }

    .field label{
      color:#cfd7e8;
      font-size:14px;
    }

    .field input, .field textarea, .field button{
      width:100%;
      border:1px solid var(--line);
      background:#101521;
      color:var(--text);
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      outline:none;
    }

    .field input:focus, .field textarea:focus{
      border-color:#5165a7;
      box-shadow:0 0 0 3px rgba(110,168,254,.12);
    }

    .btn{
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      font-weight:700;
      transition:transform .15s ease, filter .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .btn.secondary{
      background:#121725;
      border:1px solid var(--line);
      font-weight:600;
    }

    .msg{
      margin-top:12px;
      min-height:22px;
      color:#ffb4b4;
      font-size:14px;
      text-align:center;
    }

    .app{
      display:none;
      height:100vh;
      grid-template-columns:360px 1fr;
    }

    .sidebar{
      background:#121620;
      border-right:1px solid var(--line);
      display:flex;
      flex-direction:column;
      height:100vh;
      min-height:0;
    }

    .sidebar h2{
      margin:0;
      padding:18px 18px 10px;
      font-size:18px;
    }

    .sidebar .small{
      color:var(--muted);
      padding:0 18px 14px;
      font-size:13px;
      line-height:1.4;
    }

    .thread-list{
      overflow-y:auto;
      padding:10px;
      flex:1;
      min-height:0;
    }

    .thread{
      padding:16px 16px;
      margin-bottom:10px;
      border-radius:16px;
      background:#151a26;
      border:1px solid transparent;
      cursor:pointer;
      transition:.15s ease;
    }

    .thread:hover{border-color:#2f3750}

    .thread.active{
      border-color:#5472d6;
      background:#182038;
    }

    .thread .name{
      font-weight:700;
      font-size:15px
    }

    .thread .last{
      color:var(--muted);
      font-size:13px;
      margin-top:6px;
      display:flex;
      gap:8px;
      align-items:center;
      overflow:hidden;
      white-space:nowrap;
    }

    .thread-preview{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      flex-shrink:0;
      display:inline-block;
      background:#94a3b8;
    }

    .status-dot.online{
      background:#4ade80;
    }

    .status-dot.offline{
      background:#f87171;
    }

    .chat{
      display:flex;
      flex-direction:column;
      height:100vh;
      min-height:0;
      background:linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    }

    .chat-head{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:rgba(18,22,32,.75);
      backdrop-filter:blur(8px);
      flex-shrink:0;
    }

    .chat-head .who{
      font-size:22px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      font-size:12px;
      color:#dbe5ff;
      background:#18223b;
      border:1px solid #2c3560;
      padding:6px 10px;
      border-radius:999px;
    }

    .pill.online{
      background:#16341f;
      border-color:#2b6a3e;
      color:#d7ffe0;
    }

    .pill.offline{
      background:#3a1a1a;
      border-color:#7b3434;
      color:#ffd7d7;
    }

    .status-btn{
      border:none;
      cursor:pointer;
      border:1px solid #2c3560;
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      color:#dbe5ff;
      background:#18223b;
    }

    .status-btn.open{
      background:#16341f;
      border-color:#2b6a3e;
      color:#d7ffe0;
    }

    .status-btn.closed{
      background:#3a1a1a;
      border-color:#7b3434;
      color:#ffd7d7;
    }

    .scroll-bottom-btn{
      border:none;
      cursor:pointer;
      background:#18223b;
      color:#dbe5ff;
      border:1px solid #2c3560;
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:700;
    }

    .scroll-bottom-btn:hover{
      filter:brightness(1.08);
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:24px 24px 18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      min-height:0;
      scroll-behavior:auto;
      width:100%;
      max-width:100%;
    }

    .bubble{
      width:min(1260px, 100%);
      background:var(--bubble);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:14px 16px;
      line-height:1.45;
      word-break:break-word;
      align-self:center;
      position:relative;
    }

    .bubble.me{
      background:var(--bubble2);
      border-color:rgba(110,168,254,.22);
    }

    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
      align-items:center;
    }

    .text{
      white-space:pre-wrap;
      font-size:15px;
      padding-right:84px;
    }

    .media-wrap{
      margin-top:10px;
      display:grid;
      gap:10px;
    }

    .message-image,
    .message-video{
      display:block;
      width:100%;
      max-width:100%;
      max-height:640px;
      object-fit:contain;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:#0f1420;
      cursor:pointer;
    }

    .image-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .img-action-btn{
      border:none;
      cursor:pointer;
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      background:#18223b;
      color:#dbe5ff;
      border:1px solid #2c3560;
    }

    .img-action-btn:hover{
      filter:brightness(1.08);
    }

    .copy-btn{
      position:absolute;
      top:12px;
      right:12px;
      border:none;
      cursor:pointer;
      border-radius:10px;
      padding:8px 10px;
      background:#151b29;
      color:#dbe5ff;
      font-size:12px;
      border:1px solid rgba(255,255,255,.08);
    }

    .copy-btn:hover{
      filter:brightness(1.08);
    }

    .copy-btn.done{
      background:#18311f;
      color:#d7ffe0;
      border-color:#2e6b40;
    }

    .composer{
      border-top:1px solid var(--line);
      padding:16px;
      background:#121620;
      flex-shrink:0;
    }

    .composer-box{
      max-width:1260px;
      width:100%;
      margin:0 auto;
      background:#101521;
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      display:grid;
      gap:12px;
    }

    .composer-top{
      display:grid;
      grid-template-columns:1fr 180px;
      gap:12px;
      align-items:stretch;
    }

    .button-stack{
      display:grid;
      gap:12px;
    }

    textarea{
      resize:none;
      min-height:110px;
      max-height:240px;
      width:100%;
      border:1px solid transparent;
      background:#0f1420;
      color:var(--text);
      border-radius:16px;
      padding:14px 16px;
      font-size:15px;
      outline:none;
      line-height:1.45;
    }

    textarea:focus{
      border-color:#5165a7;
      box-shadow:0 0 0 3px rgba(110,168,254,.12);
    }

    .send-btn{
      min-width:150px;
      min-height:110px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      font-size:16px;
      font-weight:800;
    }

    .send-btn.small{
      min-height:56px;
      font-size:15px;
    }

    .send-btn:disabled{
      cursor:not-allowed;
      filter:grayscale(.2) brightness(.85);
      opacity:.8;
    }

    .composer-bottom{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .counter{
      color:var(--muted);
      font-size:13px;
    }

    .status-line{
      color:#ffb4b4;
      font-size:13px;
      font-weight:700;
      min-height:18px;
    }

    .hidden{display:none !important}

    .empty{
      color:var(--muted);
      margin:auto;
      text-align:center;
      padding:30px;
    }

    .image-modal{
      position:fixed;
      inset:0;
      z-index:9999;
      display:grid;
      place-items:center;
      padding:18px;
    }

    .image-modal.hidden{
      display:none !important;
    }

    .image-modal-backdrop{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);
    }

    .image-modal-panel{
      position:relative;
      z-index:1;
      width:min(96vw, 1480px);
      max-height:92vh;
      background:#101521;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 24px 80px rgba(0,0,0,.5);
      padding:14px;
      display:grid;
      gap:12px;
    }

    .image-modal-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,.08);
      padding-bottom:12px;
    }

    .image-modal-title{
      font-size:16px;
      font-weight:800;
      color:var(--text);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:70vw;
    }

    .image-modal-close{
      border:none;
      cursor:pointer;
      width:42px;
      height:42px;
      border-radius:12px;
      background:#18223b;
      color:#dbe5ff;
      border:1px solid #2c3560;
      font-size:22px;
      line-height:1;
      flex-shrink:0;
    }

    .image-modal-image,
    .image-modal-video{
      width:100%;
      max-height:calc(92vh - 120px);
      object-fit:contain;
      border-radius:18px;
      background:#0b0f18;
      border:1px solid rgba(255,255,255,.08);
    }

    .image-modal-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    @media (max-width: 900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        min-height:auto;
        border-right:none;
        border-bottom:1px solid var(--line);
        height:auto;
      }
      .chat{min-height:auto}
      .bubble{width:96%}
      .composer-top{grid-template-columns:1fr}
      .send-btn{min-height:56px; width:100%}
      .messages{padding:14px}
      .text{padding-right:0}
      .copy-btn{
        position:static;
        margin-top:10px;
      }
      .chat-head{
        align-items:flex-start;
        flex-direction:column;
      }
      .top-actions{
        width:100%;
        justify-content:flex-start;
      }
      .image-modal-panel{
        width:100%;
        max-height:94vh;
      }
      .image-modal-image,
      .image-modal-video{
        max-height:calc(94vh - 130px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="loginScreen" class="login">
        <h1 class="title">GloGeGo</h1>
        <p class="subtitle">Giriş yap ve mesajlaşmaya başla.</p>

        <div class="field">
          <label for="username">Kullanıcı adı</label>
          <input id="username" autocomplete="username" placeholder="Kullanıcı adın" />
        </div>

        <div class="field">
          <label for="password">Şifre</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="Şifren" />
        </div>

        <button class="btn" id="loginBtn">Giriş Yap</button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <div id="appScreen" class="app">
        <aside id="sidebar" class="sidebar hidden">
          <h2>Mesaj atanlar</h2>
          <div class="small">Solda son mesaj atan kullanıcılar görünür.</div>
          <div id="threadList" class="thread-list"></div>
        </aside>

        <main class="chat">
          <div class="chat-head">
            <div class="who">GloGeGo</div>
            <div class="top-actions">
              <span id="userPill" class="pill"></span>
              <span id="threadStatusPill" class="pill hidden"></span>
              <button id="statusToggleBtn" class="status-btn hidden">Durum</button>
              <button id="scrollBottomBtn" class="scroll-bottom-btn">En Alta İn</button>
              <button id="logoutBtn" class="btn secondary" style="width:auto;padding:10px 14px;">Çıkış</button>
            </div>
          </div>

          <div id="messages" class="messages">
            <div class="empty">Bir mesaj seç ya da yaz.</div>
          </div>

          <div class="composer">
            <div class="composer-box">
              <div class="composer-top">
                <textarea id="messageInput" maxlength="500000" placeholder="Mesaj yaz..."></textarea>

                <div class="button-stack">
                  <button id="sendBtn" class="send-btn">Gönder</button>
                  <button id="imageBtn" class="send-btn small">Resim</button>
                  <button id="videoBtn" class="send-btn small">Video</button>
                </div>
              </div>

              <input id="imageInput" type="file" accept="image/*" hidden />
              <input id="videoInput" type="file" accept="video/*" hidden />

              <div class="composer-bottom">
                <span class="counter"><span id="charCount">0</span> / 500000</span>
                <span id="statusLine" class="status-line"></span>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <div id="imageModal" class="image-modal hidden" aria-hidden="true">
    <div id="imageModalBackdrop" class="image-modal-backdrop"></div>

    <div class="image-modal-panel" role="dialog" aria-modal="true" aria-label="Medya görüntüleyici">
      <div class="image-modal-top">
        <div id="imageModalTitle" class="image-modal-title">Medya</div>
        <button id="imageModalClose" class="image-modal-close" type="button">×</button>
      </div>

      <img id="imageModalImg" class="image-modal-image hidden" alt="Büyütülmüş resim" />
      <video id="imageModalVideo" class="image-modal-video hidden" controls playsinline></video>

      <div class="image-modal-actions">
        <button id="imageModalOpenNewTab" class="img-action-btn" type="button">Yeni Sekmede Aç</button>
        <button id="imageModalDownload" class="img-action-btn" type="button">İndir</button>
        <button id="imageModalFullscreen" class="img-action-btn" type="button">Tam Ekran</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      addDoc,
      query,
      where,
      orderBy,
      onSnapshot,
      doc,
      getDocs,
      setDoc,
      serverTimestamp,
      Timestamp,
      deleteDoc
    } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjRWkAyRNGDvTgvd5ovfhIR_nZJn5dxVg",
      authDomain: "glogego.firebaseapp.com",
      projectId: "glogego",
      storageBucket: "glogego.firebasestorage.app",
      messagingSenderId: "461333037491",
      appId: "1:461333037491:web:60a57736a91812200dcbc6",
      measurementId: "G-1NQ1BQLX0V"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const ADMIN_USER = "GloGeGo";
    const ADMIN_PASS = "9119";
    const DAY_MS = 24 * 60 * 60 * 1000;
    const IMAGE_EXPIRE_MS = 12 * 60 * 60 * 1000;
    const VIDEO_EXPIRE_MS = 1 * 60 * 60 * 1000;
    const MAX_TEXT = 500000;

    const MAX_IMAGE_SIDE = 1400;
    const START_JPEG_QUALITY = 0.82;
    const MAX_DATAURL_LENGTH = 850000;

    const MAX_VIDEO_SECONDS = 30;
    const MAX_VIDEO_FILE_SIZE = 180 * 1024 * 1024;
    const VIDEO_CHUNK_LENGTH = 700000;

    const PRESENCE_ONLINE_MS = 20 * 1000;
    const PRESENCE_HEARTBEAT_MS = 10 * 1000;

    const loginScreen = document.getElementById("loginScreen");
    const appScreen = document.getElementById("appScreen");
    const sidebar = document.getElementById("sidebar");
    const threadList = document.getElementById("threadList");
    const messagesEl = document.getElementById("messages");
    const userPill = document.getElementById("userPill");
    const threadStatusPill = document.getElementById("threadStatusPill");
    const scrollBottomBtn = document.getElementById("scrollBottomBtn");
    const statusToggleBtn = document.getElementById("statusToggleBtn");
    const statusLine = document.getElementById("statusLine");

    const usernameInput = document.getElementById("username");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const loginMsg = document.getElementById("loginMsg");
    const logoutBtn = document.getElementById("logoutBtn");

    const messageInput = document.getElementById("messageInput");
    const sendBtn = document.getElementById("sendBtn");
    const imageBtn = document.getElementById("imageBtn");
    const videoBtn = document.getElementById("videoBtn");
    const imageInput = document.getElementById("imageInput");
    const videoInput = document.getElementById("videoInput");
    const charCount = document.getElementById("charCount");

    const imageModal = document.getElementById("imageModal");
    const imageModalBackdrop = document.getElementById("imageModalBackdrop");
    const imageModalClose = document.getElementById("imageModalClose");
    const imageModalImg = document.getElementById("imageModalImg");
    const imageModalVideo = document.getElementById("imageModalVideo");
    const imageModalTitle = document.getElementById("imageModalTitle");
    const imageModalOpenNewTab = document.getElementById("imageModalOpenNewTab");
    const imageModalDownload = document.getElementById("imageModalDownload");
    const imageModalFullscreen = document.getElementById("imageModalFullscreen");

    const sessionKey = "glogego_session";
    const statusDocRef = doc(db, "settings", "chatStatus");

    let currentUser = null;
    let isAdmin = false;
    let selectedThread = null;
    let chatOpen = true;
    let unsubscribeMessages = null;
    let unsubscribeThreads = null;
    let unsubscribeStatus = null;
    let unsubscribePresence = null;
    let cleanupTimer = null;
    let presenceTimer = null;
    let presencePingTimer = null;
    let lastThreadsCache = [];
    let presenceMap = new Map();
    let currentModalMediaUrl = "";
    let currentModalMediaName = "";
    let currentModalMediaType = "";

    function escapeHtml(str = "") {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeKey(value = "") {
      return String(value).trim().toLowerCase();
    }

    function safeDocId(value = "") {
      const raw = String(value ?? "").trim();
      return encodeURIComponent(raw || "user").slice(0, 150);
    }

    function formatTime(value) {
      try {
        const d = value?.toDate ? value.toDate() : (value ? new Date(value) : null);
        if (!d || isNaN(d.getTime())) return "";
        return d.toLocaleString("tr-TR", { dateStyle: "short", timeStyle: "short" });
      } catch {
        return "";
      }
    }

    function formatRelativeSeen(data) {
      const last = Number(data?.lastSeenClient || 0);
      if (!last) return "çevrimdışı";

      const diff = Date.now() - last;
      if (isUserOnline(data)) return "çevrimiçi";
      if (diff < 60 * 1000) return "son görülme az önce";
      if (diff < 60 * 60 * 1000) return `son görülme ${Math.max(1, Math.floor(diff / 60000))} dk önce`;
      if (diff < 24 * 60 * 60 * 1000) return `son görülme ${Math.max(1, Math.floor(diff / 3600000))} saat önce`;
      return `son görülme ${new Date(last).toLocaleString("tr-TR", { dateStyle: "short", timeStyle: "short" })}`;
    }

    function isUserOnline(data) {
      const last = Number(data?.lastSeenClient || 0);
      const age = Date.now() - last;
      return data?.isOnline !== false && last > 0 && age < PRESENCE_ONLINE_MS;
    }

    function getPresenceData(username = "") {
      return presenceMap.get(normalizeKey(username));
    }

    function setLoginError(text) {
      loginMsg.textContent = text;
    }

    function saveSession() {
      sessionStorage.setItem(sessionKey, JSON.stringify({ currentUser, isAdmin }));
    }

    function loadSession() {
      try {
        const raw = sessionStorage.getItem(sessionKey);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data?.currentUser) return false;
        currentUser = data.currentUser;
        isAdmin = !!data.isAdmin;
        return true;
      } catch {
        return false;
      }
    }

    function clearSession() {
      sessionStorage.removeItem(sessionKey);
    }

    function updateThreadStatusPill() {

        threadStatusPill.classList.add("hidden");

      }

      if (!selectedThread) {
        threadStatusPill.textContent = "Sohbet seç";

        threadStatusPill.classList.remove("hidden");
        return;
      }

      const data = getPresenceData(selectedThread);
      const online = isUserOnline(data);

      threadStatusPill.textContent = online ? "Aktif" : formatRelativeSeen(data);
      threadStatusPill.className = `pill ${online ? "online" : "offline"}`;
      threadStatusPill.classList.remove("hidden");

    function renderThreadList() {
      if (!isAdmin) return;

      const list = lastThreadsCache;

      if (!list.length) {
        threadList.innerHTML = `<div class="empty" style="padding:18px;">Henüz mesaj yok.</div>`;
        updateThreadStatusPill();
        return;
      }

      threadList.innerHTML = list.map(({ thread, data }) => {
        const p = getPresenceData(thread);
        const online = isUserOnline(p);
        const statusText = online ? "Aktif" : formatRelativeSeen(p);
        const lastMsg = data.mediaKind === "videoMeta"
          ? "Video"
          : data.text || (data.imageDataUrl ? "Resim" : "");

        return `
          <div class="thread ${selectedThread === thread ? "active" : ""}" data-thread="${escapeHtml(thread)}">

        el.addEventListener("click", () => {
          selectedThread = el.dataset.thread;

          updateThreadStatusPill();
        });

      updateThreadStatusPill();

    async function markPresence(isOnline = true) {
      if (!currentUser) return;

      try {
        await setDoc(doc(db, "presence", safeDocId(currentUser)), {
          username: currentUser,
          usernameKey: normalizeKey(currentUser),
          isAdmin,
          isOnline,
          lastSeen: serverTimestamp(),
          lastSeenClient: Date.now(),
          updatedAt: serverTimestamp()
        }, { merge: true });
      } catch (err) {
        console.warn("Presence update skipped:", err);
      }
    }

    function startPresenceTracking() {
      stopPresenceTracking();
      void markPresence(true);

      presenceTimer = setInterval(() => {
        if (document.visibilityState === "visible") {
          void markPresence(true);
        }
      }, PRESENCE_HEARTBEAT_MS);

      window.addEventListener("beforeunload", handleLeave, { once: true });
      window.addEventListener("pagehide", handleLeave, { once: true });
      document.addEventListener("visibilitychange", handleVisibility);
    }

    function stopPresenceTracking() {
      if (presenceTimer) clearInterval(presenceTimer);
      presenceTimer = null;

      if (presencePingTimer) clearInterval(presencePingTimer);
      presencePingTimer = null;

      document.removeEventListener("visibilitychange", handleVisibility);
    }

    function handleVisibility() {
      if (!currentUser) return;

      if (document.visibilityState === "visible") {
        void markPresence(true);
      } else {
        void markPresence(false);
      }
    }

    function handleLeave() {
      void markPresence(false);
    }

      listenStatus();

      listenPresence();
      if (isAdmin) listenThreads();

      cleanupTimer = setInterval(cleanupExpiredMessages, 10 * 60 * 1000);

    function dataUrlSizeOk(dataUrl) {
      return typeof dataUrl === "string" && dataUrl.length <= MAX_DATAURL_LENGTH;
    }

    async function fileToImageElement(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Resim yüklenemedi."));
        };
        img.src = url;
      });
    }

    async function compressImageToDataUrl(file) {
      const img = await fileToImageElement(file);

      let width = img.naturalWidth || img.width;
      let height = img.naturalHeight || img.height;

      if (!width || !height) {
        throw new Error("Resim boyutu okunamadı.");
      }

      const scale = Math.min(1, MAX_IMAGE_SIDE / Math.max(width, height));
      width = Math.max(1, Math.round(width * scale));
      height = Math.max(1, Math.round(height * scale));

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Canvas açılamadı.");

      ctx.drawImage(img, 0, 0, width, height);

      let quality = START_JPEG_QUALITY;
      let dataUrl = "";

      for (let i = 0; i < 4; i++) {
        dataUrl = canvas.toDataURL("image/jpeg", quality);
        if (dataUrl.length <= MAX_DATAURL_LENGTH) break;
        quality -= 0.09;
      }

      if (dataUrl.length > MAX_DATAURL_LENGTH) {
        throw new Error("Resim hâlâ çok büyük. Daha küçük bir resim yükle.");
      }

      return {
        dataUrl,
        width,
        height,
        mime: "image/jpeg"
      };
    }

    function mergeMediaMessages(items) {
      const output = [];
      const videoGroups = new Map();

      for (const item of items) {
        const kind = item.mediaKind || "";

        if (kind === "videoChunk") {
          const groupId = item.mediaGroupId || "";
          if (!groupId) continue;

          if (!videoGroups.has(groupId)) {
            videoGroups.set(groupId, {
              meta: null,
              chunks: [],
              firstClient: item.createdAtClient || 0
            });
          }

          const group = videoGroups.get(groupId);
          group.chunks[Number(item.videoChunkIndex || 0)] = item.videoChunkData || "";
          group.firstClient = Math.min(group.firstClient || Infinity, item.createdAtClient || 0);
          continue;
        }

        if (kind === "videoMeta") {
          const groupId = item.mediaGroupId || "";
          if (!groupId) continue;

          if (!videoGroups.has(groupId)) {
            videoGroups.set(groupId, {
              meta: null,
              chunks: [],
              firstClient: item.createdAtClient || 0
            });
          }

          const group = videoGroups.get(groupId);
          group.meta = item;
          group.firstClient = Math.min(group.firstClient || Infinity, item.createdAtClient || 0);
          continue;
        }

        output.push(item);
      }

      for (const [groupId, group] of videoGroups.entries()) {
        const meta = group.meta;
        if (!meta) continue;

        const expected = Number(meta.videoChunkCount || 0);
        const chunkList = group.chunks.filter(Boolean);
        const complete = expected > 0 && chunkList.length === expected;

        output.push({
          ...meta,
          id: meta.id || groupId,
          mediaKind: "video",
          videoDataUrl: complete ? chunkList.join("") : "",
          videoLoading: !complete,
          createdAtClient: meta.createdAtClient || group.firstClient || 0
        });
      }

      output.sort((a, b) => (a.createdAtClient || 0) - (b.createdAtClient || 0));
      return output;
    }

    function listenMessages() {
      if (unsubscribeMessages) unsubscribeMessages();
      messagesEl.innerHTML = `<div class="empty">Yükleniyor...</div>`;

      const threadId = isAdmin ? selectedThread : currentUser;
      if (!threadId) {
        renderEmpty("Bir sohbet seç.");
        return;
      }

      const q = query(collection(db, "messages"), where("threadId", "==", threadId));

      unsubscribeMessages = onSnapshot(q, (snap) => {
        const items = [];
        snap.forEach((d) => items.push({ id: d.id, ...d.data() }));

        const merged = mergeMediaMessages(items);

        if (!merged.length) {
          renderEmpty("Henüz mesaj yok.");
          return;
        }

        messagesEl.innerHTML = merged.map(renderMessage).join("");

        messagesEl.querySelectorAll(".copy-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const text = decodeURIComponent(btn.dataset.copy || "");
            await copyText(text, btn);
          });
        });

        messagesEl.querySelectorAll("[data-open-media]").forEach((btn) => {
          btn.addEventListener("click", () => {
            openMediaModal(
              btn.dataset.openMedia || "",
              btn.dataset.mediaName || "Medya",
              btn.dataset.mediaType || (btn.dataset.openMedia?.startsWith("data:video") ? "video" : "image")
            );
          });
        });

        messagesEl.querySelectorAll("[data-download-media]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            await downloadDataUrl(btn.dataset.downloadMedia || "", btn.dataset.mediaName || "medya");
          });
        });

        messagesEl.querySelectorAll(".message-image").forEach((img) => {
          img.addEventListener("click", () => {
            openMediaModal(img.dataset.imageUrl || "", img.dataset.imageName || "Resim", "image");
          });
        });

        messagesEl.querySelectorAll(".message-video").forEach((video) => {
          video.addEventListener("click", () => {
            openMediaModal(video.dataset.videoUrl || "", video.dataset.mediaName || "Video", "video");
          });
        });

        requestAnimationFrame(scrollToBottomFast);
      }, () => {
        renderEmpty("Mesajlar yüklenemedi.");
      });
    }

    function listenThreads() {
      if (unsubscribeThreads) unsubscribeThreads();

      const q = query(collection(db, "messages"), orderBy("createdAtClient", "desc"));
      unsubscribeThreads = onSnapshot(q, (snap) => {
        const latestByUser = new Map();

        snap.forEach((d) => {
          const data = d.data();
          if (!data.threadId) return;
          if (data.sender === ADMIN_USER) return;
          if (data.mediaKind === "videoChunk") return;

          if (!latestByUser.has(data.threadId)) {
            latestByUser.set(data.threadId, data);
          }
        });

        lastThreadsCache = Array.from(latestByUser.entries()).map(([thread, data]) => ({
          thread,
          data
        }));

        if (!selectedThread && lastThreadsCache.length) {
          selectedThread = lastThreadsCache[0].thread;
          listenMessages();
        }

        renderThreadList();
      });
    }

    function listenPresence() {
      if (unsubscribePresence) unsubscribePresence();

      unsubscribePresence = onSnapshot(collection(db, "presence"), (snap) => {
        const map = new Map();

        snap.forEach((d) => {
          const data = d.data() || {};
          const key = normalizeKey(data.username || data.usernameKey || d.id);
          map.set(key, { ...data, _id: d.id });
        });

        presenceMap = map;
        renderThreadList();
        updateThreadStatusPill();
      }, () => {
        presenceMap = new Map();
        renderThreadList();
        updateThreadStatusPill();
      });
    }

    async function sendImage(file) {
      const threadId = isAdmin ? selectedThread : currentUser;

      if (!threadId) {
        alert("Önce bir sohbet seç.");
        return;
      }

      if (!isAdmin && !chatOpen) {
        alert("GloGeGo müsait değil.");
        return;
      }

      if (!file) return;

      if (!file.type.startsWith("image/")) {
        alert("Sadece resim yükleyebilirsin.");

      }

      imageBtn.disabled = true;
      imageBtn.textContent = "Sıkıştırılıyor...";

        if (!dataUrlSizeOk(compressed.dataUrl)) {
          throw new Error("Resim çok büyük. Daha küçük bir resim seç.");
        }

        await addDoc(collection(db, "messages"), {
          threadId,
          sender: currentUser,
          recipient: isAdmin ? threadId : ADMIN_USER,
          text: "",
          imageDataUrl: compressed.dataUrl,
          imageName: file.name,
          imageType: compressed.mime,
          imageWidth: compressed.width,
          imageHeight: compressed.height,
          mediaKind: "image",
          mediaGroupId: "",
          videoDataUrl: "",
          videoName: "",
          videoType: "",
          videoDuration: 0,
          videoChunkCount: 0,
          videoChunkIndex: 0,
          videoChunkData: "",
          createdAt: serverTimestamp(),
          createdAtClient: Date.now(),
          expiresAt: Timestamp.fromDate(new Date(Date.now() + IMAGE_EXPIRE_MS))
        });
      } catch (err) {
        console.error(err);

      } finally {
        imageBtn.disabled = false;
        imageBtn.textContent = "Resim";
        imageInput.value = "";
        updateComposerState();

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result || ""));
        reader.onerror = () => reject(new Error("Video okunamadı."));
        reader.readAsDataURL(file);
      });
    }

    function getVideoDuration(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const video = document.createElement("video");
        video.preload = "metadata";
        video.onloadedmetadata = () => {
          const duration = Number(video.duration || 0);
          URL.revokeObjectURL(url);
          resolve(duration);
        };
        video.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Video bilgisi okunamadı."));
        };
        video.src = url;
      });
    }

    async function sendVideo(file) {
      const threadId = isAdmin ? selectedThread : currentUser;

      if (!threadId) {
        alert("Önce bir sohbet seç.");
        return;
      }

      if (!isAdmin && !chatOpen) {
        alert("GloGeGo müsait değil.");
        return;
      }

      if (!file) return;

      if (!file.type.startsWith("video/")) {
        alert("Sadece video yükleyebilirsin.");
        return;
      }

      if (file.size > MAX_VIDEO_FILE_SIZE) {
        alert("Video çok büyük. En fazla 180 MB yükleyebilirsin.");
        return;
      }

      videoBtn.disabled = true;
      videoBtn.textContent = "Kontrol ediliyor...";
      statusLine.textContent = "Video analiz ediliyor...";

      try {
        const duration = await getVideoDuration(file);

        if (!Number.isFinite(duration) || duration <= 0) {
          throw new Error("Video süresi okunamadı.");
        }

        if (duration > MAX_VIDEO_SECONDS) {
          throw new Error("Video 30 saniyeden uzun olamaz.");
        }

        videoBtn.textContent = "Yükleniyor...";
        statusLine.textContent = "Video dönüştürülüyor...";

        const dataUrl = await readFileAsDataUrl(file);
        const chunkCount = Math.max(1, Math.ceil(dataUrl.length / VIDEO_CHUNK_LENGTH));
        const groupId = `video_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        const expiresAt = Timestamp.fromDate(new Date(Date.now() + VIDEO_EXPIRE_MS));
        const createdAtClient = Date.now();

        await addDoc(collection(db, "messages"), {
          threadId,
          sender: currentUser,
          recipient: isAdmin ? threadId : ADMIN_USER,
          text: "",
          imageDataUrl: "",
          imageName: "",
          imageType: "",
          imageWidth: 0,
          imageHeight: 0,
          mediaKind: "videoMeta",
          mediaGroupId: groupId,
          videoDataUrl: "",
          videoName: file.name,
          videoType: file.type,
          videoDuration: duration,
          videoChunkCount: chunkCount,
          videoChunkIndex: 0,
          videoChunkData: "",
          createdAt: serverTimestamp(),
          createdAtClient,
          expiresAt
        });

        for (let i = 0; i < chunkCount; i++) {
          const chunkData = dataUrl.slice(i * VIDEO_CHUNK_LENGTH, (i + 1) * VIDEO_CHUNK_LENGTH);

          await addDoc(collection(db, "messages"), {
            threadId,
            sender: currentUser,
            recipient: isAdmin ? threadId : ADMIN_USER,
            text: "",
            imageDataUrl: "",
            imageName: "",
            imageType: "",
            imageWidth: 0,
            imageHeight: 0,
            mediaKind: "videoChunk",
            mediaGroupId: groupId,
            videoDataUrl: "",
            videoName: file.name,
            videoType: file.type,
            videoDuration: duration,
            videoChunkCount: chunkCount,
            videoChunkIndex: i,
            videoChunkData: chunkData,
            createdAt: serverTimestamp(),
            createdAtClient,
            expiresAt
          });

          statusLine.textContent = `Video yükleniyor... ${i + 1}/${chunkCount}`;
        }

        statusLine.textContent = "Video gönderildi.";
        setTimeout(() => {
          if (statusLine.textContent === "Video gönderildi.") statusLine.textContent = "";
        }, 2000);
      } catch (err) {
        console.error(err);
        alert(err?.message || "Video yüklenemedi.");
        statusLine.textContent = "";
      } finally {
        videoBtn.disabled = false;
        videoBtn.textContent = "Video";
        videoInput.value = "";
        updateComposerState();
      }
    }

    async function cleanupExpiredMessages() {
      try {
        const now = Timestamp.now();
        const q = query(collection(db, "messages"), where("expiresAt", "<=", now));
        const snap = await getDocs(q);

        for (const d of snap.docs) {
          await deleteDoc(doc(db, "messages", d.id));
        }
      } catch (err) {
        console.warn("Cleanup skipped:", err);
      }
    }

    loginBtn.addEventListener("click", login);
    passwordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    usernameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    logoutBtn.addEventListener("click", logout);

    sendBtn.addEventListener("click", sendMessage);
    scrollBottomBtn.addEventListener("click", scrollToBottomFast);
    statusToggleBtn.addEventListener("click", toggleChatStatus);

    imageBtn.addEventListener("click", () => {
      if (imageBtn.disabled) return;
      imageInput.click();
    });

    videoBtn.addEventListener("click", () => {
      if (videoBtn.disabled) return;
      videoInput.click();
    });

    imageInput.addEventListener("change", () => {
      const file = imageInput.files && imageInput.files[0];
      if (file) sendImage(file);
    });

    videoInput.addEventListener("change", () => {
      const file = videoInput.files && videoInput.files[0];
      if (file) sendVideo(file);
    });

    messageInput.addEventListener("input", () => {
      charCount.textContent = String(messageInput.value.length);
    });

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        sendMessage();
      }
    });

    imageModalBackdrop.addEventListener("click", closeMediaModal);
    imageModalClose.addEventListener("click", closeMediaModal);

    imageModalOpenNewTab.addEventListener("click", () => {
      if (currentModalMediaUrl) {
        window.open(currentModalMediaUrl, "_blank", "noopener,noreferrer");
      }
    });

    imageModalDownload.addEventListener("click", async () => {
      if (currentModalMediaUrl) {
        await downloadDataUrl(currentModalMediaUrl, currentModalMediaName || "medya");
      }
    });

    imageModalFullscreen.addEventListener("click", async () => {
      try {
        if (currentModalMediaType === "video" && imageModalVideo.requestFullscreen) {
          await imageModalVideo.requestFullscreen();
        } else if (imageModal.requestFullscreen) {
          await imageModal.requestFullscreen();
        }
      } catch (err) {
        console.warn(err);
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !imageModal.classList.contains("hidden")) {
        closeMediaModal();
      }
    });

    if (loadSession()) {
      showApp();
    } else {
      showLogin();
    }
  </script>
</body>
</html>
