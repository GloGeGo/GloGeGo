<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GloGeGo</title>
  <style>
    :root{
      --bg:#0f1115;
      --panel:#171a21;
      --panel2:#1d2230;
      --line:#2a3141;
      --text:#e8ecf5;
      --muted:#9aa6bd;
      --accent:#6ea8fe;
      --accent2:#8b5cf6;
      --bubble:#202636;
      --bubble2:#26304a;
      --shadow:0 16px 50px rgba(0,0,0,.35);
      --good:#4ade80;
      --bad:#f87171;
    }

    *{box-sizing:border-box}
    html, body{
      height:100%;
      overflow:hidden;
    }
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top, #1b2140 0, var(--bg) 45%);
      color:var(--text);
    }

    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }

    .card{
      width:min(1400px,100%);
      height:100vh;
      background:rgba(17,20,29,.92);
      border:1px solid rgba(255,255,255,.06);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter:blur(12px);
      position:relative;
    }

    .login{
      max-width:520px;
      padding:28px;
      margin:auto;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .title{
      font-size:34px;
      margin:0 0 8px;
      text-align:center;
    }

    .subtitle{
      color:var(--muted);
      margin:0 0 24px;
      line-height:1.5;
      text-align:center;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-bottom:16px;
    }

    .field label{
      color:#cfd7e8;
      font-size:14px;
    }

    .field input, .field textarea, .field button{
      width:100%;
      border:1px solid var(--line);
      background:#101521;
      color:var(--text);
      border-radius:14px;
      padding:14px 16px;
      font-size:15px;
      outline:none;
    }

    .field input:focus, .field textarea:focus, textarea:focus{
      border-color:#5165a7;
      box-shadow:0 0 0 3px rgba(110,168,254,.12);
    }

    .btn{
      border:none;
      cursor:pointer;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:white;
      font-weight:700;
      transition:transform .15s ease, filter .15s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
    }

    .btn.secondary{
      background:#121725;
      border:1px solid var(--line);
      font-weight:600;
    }

    .msg{
      margin-top:12px;
      min-height:22px;
      color:#ffb4b4;
      font-size:14px;
      text-align:center;
    }

    .app{
      display:none;
      height:100vh;
      grid-template-columns:360px 1fr;
    }

    .sidebar{
      background:#121620;
      border-right:1px solid var(--line);
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .sidebar h2{
      margin:0;
      padding:18px 18px 10px;
      font-size:18px;
    }

    .sidebar .small{
      color:var(--muted);
      padding:0 18px 14px;
      font-size:13px;
      line-height:1.4;
    }

    .thread-list{
      overflow-y:auto;
      padding:10px;
      flex:1;
      min-height:0;
    }

    .thread{
      padding:16px;
      margin-bottom:10px;
      border-radius:16px;
      background:#151a26;
      border:1px solid transparent;
      cursor:pointer;
      transition:.15s ease;
    }

    .thread:hover{border-color:#2f3750}
    .thread.active{
      border-color:#5472d6;
      background:#182038;
    }

    .thread .name{
      font-weight:700;
      font-size:15px;
    }

    .thread .last{
      color:var(--muted);
      font-size:13px;
      margin-top:6px;
      display:flex;
      gap:8px;
      align-items:center;
      overflow:hidden;
      white-space:nowrap;
    }

    .thread-preview{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .status-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      flex-shrink:0;
      display:inline-block;
      background:#94a3b8;
    }
    .status-dot.online{background:var(--good)}
    .status-dot.offline{background:var(--bad)}

    .chat{
      display:flex;
      flex-direction:column;
      min-height:0;
      background:linear-gradient(180deg, rgba(255,255,255,.02), transparent);
    }

    .chat-head{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      background:rgba(18,22,32,.75);
      backdrop-filter:blur(8px);
      flex-shrink:0;
    }

    .chat-head .who{
      font-size:22px;
      font-weight:900;
      letter-spacing:.3px;
    }

    .top-actions{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .pill{
      font-size:12px;
      color:#dbe5ff;
      background:#18223b;
      border:1px solid #2c3560;
      padding:6px 10px;
      border-radius:999px;
    }
    .pill.online{
      background:#16341f;
      border-color:#2b6a3e;
      color:#d7ffe0;
    }
    .pill.offline{
      background:#3a1a1a;
      border-color:#7b3434;
      color:#ffd7d7;
    }

    .status-btn, .scroll-bottom-btn, .img-action-btn, .live-btn{
      border:none;
      cursor:pointer;
      border:1px solid #2c3560;
      border-radius:12px;
      padding:10px 14px;
      font-size:13px;
      font-weight:800;
      color:#dbe5ff;
      background:#18223b;
    }

    .status-btn.open, .live-btn.open{
      background:#16341f;
      border-color:#2b6a3e;
      color:#d7ffe0;
    }
    .status-btn.closed, .live-btn.closed{
      background:#3a1a1a;
      border-color:#7b3434;
      color:#ffd7d7;
    }

    .scroll-bottom-btn:hover, .status-btn:hover, .img-action-btn:hover, .live-btn:hover{
      filter:brightness(1.08);
    }

    .live-panel{
      border-bottom:1px solid var(--line);
      background:#101521;
      padding:14px 18px;
      display:grid;
      gap:12px;
      flex-shrink:0;
    }

    .live-panel.hidden{display:none}
    .live-top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
    }

    .live-title{
      font-size:15px;
      font-weight:900;
      margin-bottom:4px;
    }

    .live-info{
      color:var(--muted);
      font-size:13px;
    }

    .live-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:12px;
    }

    .video-card{
      background:#0c1018;
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      overflow:hidden;
      min-height:220px;
      display:flex;
      flex-direction:column;
    }

    .video-label{
      padding:10px 12px;
      font-size:13px;
      color:#cfd7e8;
      border-bottom:1px solid rgba(255,255,255,.08);
      background:#111727;
    }


    .live-note{
      padding:12px 14px 0;
      color:var(--muted);
      font-size:13px;
      line-height:1.5;
    }

    .live-event-log{
      padding:12px 14px 0;
      display:grid;
      gap:8px;
      color:#dbe5ff;
      font-size:13px;
    }

    .live-event{
      background:#121a2a;
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:10px 12px;
      color:#dbe5ff;
      line-height:1.45;
    }

    video{
      width:100%;
      height:100%;
      max-height:48vh;
      object-fit:contain;
      background:#05070c;
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:24px 24px 18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      align-items:center;
      min-height:0;
      width:100%;
      max-width:100%;
    }

    .bubble{
      width:min(1260px,100%);
      background:var(--bubble);
      border:1px solid rgba(255,255,255,.06);
      border-radius:18px;
      padding:14px 16px;
      line-height:1.45;
      word-break:break-word;
      align-self:center;
      position:relative;
    }

    .bubble.me{
      background:var(--bubble2);
      border-color:rgba(110,168,254,.22);
    }

    .meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      margin-bottom:6px;
      font-size:12px;
      color:var(--muted);
      align-items:center;
    }

    .text{
      white-space:pre-wrap;
      font-size:15px;
      padding-right:84px;
    }

    .media-wrap{
      margin-top:10px;
      display:grid;
      gap:10px;
    }

    .message-image{
      display:block;
      width:100%;
      max-height:640px;
      object-fit:contain;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.08);
      background:#0f1420;
      cursor:pointer;
    }

    .image-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .copy-btn{
      position:absolute;
      top:12px;
      right:12px;
      border:none;
      cursor:pointer;
      border-radius:10px;
      padding:8px 10px;
      background:#151b29;
      color:#dbe5ff;
      font-size:12px;
      border:1px solid rgba(255,255,255,.08);
    }

    .copy-btn.done{
      background:#18311f;
      color:#d7ffe0;
      border-color:#2e6b40;
    }

    .composer{
      border-top:1px solid var(--line);
      padding:16px;
      background:#121620;
      flex-shrink:0;
    }

    .composer-box{
      max-width:1260px;
      width:100%;
      margin:0 auto;
      background:#101521;
      border:1px solid var(--line);
      border-radius:20px;
      padding:14px;
      display:grid;
      gap:12px;
    }

    .composer-top{
      display:grid;
      grid-template-columns:1fr 180px;
      gap:12px;
      align-items:stretch;
    }

    .button-stack{
      display:grid;
      gap:12px;
    }

    textarea{
      resize:none;
      min-height:110px;
      max-height:240px;
      width:100%;
      border:1px solid transparent;
      background:#0f1420;
      color:var(--text);
      border-radius:16px;
      padding:14px 16px;
      font-size:15px;
      outline:none;
      line-height:1.45;
    }

    .send-btn{
      min-width:150px;
      min-height:110px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      color:#fff;
      font-size:16px;
      font-weight:800;
    }

    .send-btn.small{
      min-height:56px;
      font-size:15px;
    }

    .send-btn:disabled, .img-action-btn:disabled, .live-btn:disabled{
      cursor:not-allowed;
      filter:grayscale(.2) brightness(.85);
      opacity:.8;
    }

    .composer-bottom{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    .counter{
      color:var(--muted);
      font-size:13px;
    }

    .status-line{
      color:#ffb4b4;
      font-size:13px;
      font-weight:700;
      min-height:18px;
    }

    .hidden{display:none !important}
    .empty{
      color:var(--muted);
      margin:auto;
      text-align:center;
      padding:30px;
    }

    .image-modal{
      position:fixed;
      inset:0;
      z-index:9999;
      display:grid;
      place-items:center;
      padding:18px;
    }
    .image-modal.hidden{display:none !important}
    .image-modal-backdrop{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.72);
      backdrop-filter:blur(6px);
    }
    .image-modal-panel{
      position:relative;
      z-index:1;
      width:min(96vw, 1480px);
      max-height:92vh;
      background:#101521;
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      box-shadow:0 24px 80px rgba(0,0,0,.5);
      padding:14px;
      display:grid;
      gap:12px;
    }
    .image-modal-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      border-bottom:1px solid rgba(255,255,255,.08);
      padding-bottom:12px;
    }
    .image-modal-title{
      font-size:16px;
      font-weight:800;
      color:var(--text);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      max-width:70vw;
    }
    .image-modal-close{
      border:none;
      cursor:pointer;
      width:42px;
      height:42px;
      border-radius:12px;
      background:#18223b;
      color:#dbe5ff;
      border:1px solid #2c3560;
      font-size:22px;
      line-height:1;
      flex-shrink:0;
    }
    .image-modal-image{
      width:100%;
      max-height:calc(92vh - 120px);
      object-fit:contain;
      border-radius:18px;
      background:#0b0f18;
      border:1px solid rgba(255,255,255,.08);
    }
    .image-modal-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

.live-room{
  position:fixed;
  inset:0;
  z-index:9000;
  display:grid;
  place-items:center;
  padding:18px;
  background:radial-gradient(circle at top, #1b2140 0, var(--bg) 45%);
}
.live-room.hidden{display:none !important}
.live-room-shell{
  width:min(1400px,100%);
  height:100vh;
  background:rgba(17,20,29,.96);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;
  box-shadow:var(--shadow);
  overflow:hidden;
  display:grid;
  grid-template-rows:auto 1fr auto;
  backdrop-filter:blur(12px);
}
.live-room-head{
  padding:18px 20px;
  border-bottom:1px solid var(--line);
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  background:rgba(18,22,32,.82);
}
.live-room-title{
  font-size:22px;
  font-weight:900;
  letter-spacing:.2px;
  margin-bottom:4px;
}
.live-room-status{
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}
.live-room-actions{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.live-room-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:16px;
  min-height:0;
}
.live-room-input{
  border-top:1px solid var(--line);
  background:#121620;
  padding:16px;
  display:grid;
  grid-template-columns:1fr 180px;
  gap:12px;
  align-items:stretch;
}
.live-room-input textarea{
  min-height:72px;
  max-height:180px;
}
.live-room-input.hidden{display:none !important}
.live-room .video-card{
  min-height:0;
}
.live-room .video-card video{
  max-height:calc(100vh - 300px);
}

    @media (max-width: 900px){
      .app{grid-template-columns:1fr}
      .sidebar{
        border-right:none;
        border-bottom:1px solid var(--line);
        height:auto;
      }
      .composer-top{grid-template-columns:1fr}
      .send-btn{min-height:56px; width:100%}
      .messages{padding:14px}
      .text{padding-right:0}
      .copy-btn{
        position:static;
        margin-top:10px;
      }
      .chat-head{
        align-items:flex-start;
        flex-direction:column;
      }
      .top-actions{
        width:100%;
        justify-content:flex-start;
      }
      .live-grid{
        grid-template-columns:1fr;
      }
      .image-modal-panel{
        width:100%;
        max-height:94vh;
      }
      .image-modal-image{
        max-height:calc(94vh - 130px);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div id="loginScreen" class="login">
        <h1 class="title">GloGeGo</h1>
        <p class="subtitle">Giriş yap ve mesajlaşmaya başla.</p>

        <div class="field">
          <label for="username">Kullanıcı adı</label>
          <input id="username" autocomplete="username" placeholder="Kullanıcı adın" />
        </div>

        <div class="field">
          <label for="password">Şifre</label>
          <input id="password" type="password" autocomplete="current-password" placeholder="Şifren" />
        </div>

        <button class="btn" id="loginBtn">Giriş Yap</button>
        <div class="msg" id="loginMsg"></div>
      </div>

      <div id="appScreen" class="app">
        <aside id="sidebar" class="sidebar hidden">
          <h2>Mesaj atanlar</h2>
          <div class="small">Solda son mesaj atan kullanıcılar görünür.</div>
          <div id="threadList" class="thread-list"></div>
        </aside>

        <main class="chat">
          <div class="chat-head">
            <div class="who">GloGeGo</div>
            <div class="top-actions">
              <span id="userPill" class="pill"></span>
              <span id="threadStatusPill" class="pill hidden"></span>
              <span id="livePill" class="pill hidden"></span>
              <button id="liveBtn" class="live-btn hidden">Live</button>
              <button id="liveAcceptBtn" class="live-btn hidden">Kabul</button>
              <button id="liveEndBtn" class="live-btn hidden">Bitir</button>
              <button id="statusToggleBtn" class="status-btn hidden">Durum</button>
              <button id="scrollBottomBtn" class="scroll-bottom-btn">En Alta İn</button>
              <button id="logoutBtn" class="btn secondary" style="width:auto;padding:10px 14px;">Çıkış</button>
            </div>
          </div>

          <section id="livePanel" class="live-panel hidden">
  <div class="live-top">
    <div>
      <div class="live-title">Canlı bağlantı</div>
      <div id="liveInfo" class="live-info">Hazır.</div>
    </div>
    <div id="liveControlHint" class="live-info"></div>
  </div>
  <div class="live-grid">
    <div id="liveRemoteCard" class="video-card">
      <div class="video-label">Canlı görüntü</div>
      <video id="remoteVideo" autoplay playsinline></video>
    </div>
  </div>
</section>

          <div id="messages" class="messages">
            <div class="empty">Bir mesaj seç ya da yaz.</div>
          </div>

          <div class="composer">
            <div class="composer-box">
              <div class="composer-top">
                <textarea id="messageInput" maxlength="500000" placeholder="Mesaj yaz..."></textarea>
                <div class="button-stack">
                  <button id="sendBtn" class="send-btn">Gönder</button>
                  <button id="imageBtn" class="send-btn small">Resim</button>
                </div>
              </div>

              <input id="imageInput" type="file" accept="image/*" hidden />

              <div class="composer-bottom">
                <span class="counter"><span id="charCount">0</span> / 500000</span>
                <span id="statusLine" class="status-line"></span>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

<div id="liveRoomScreen" class="live-room hidden">
  <div class="live-room-shell">
    <div class="live-room-head">
      <div>
        <div id="liveRoomTitle" class="live-room-title">Canlı oda</div>
        <div id="liveRoomStatus" class="live-room-status">Hazırlanıyor...</div>
      </div>
      <div class="live-room-actions">
        <span id="liveRoomRolePill" class="pill"></span>
        <button id="liveRoomEndBtn" class="btn secondary" style="width:auto;padding:10px 14px;">Bitir</button>
      </div>
    </div>

    <div class="live-room-grid">
      <div id="liveRoomRemoteCard" class="video-card">
        <div class="video-label">Karşı kamera</div>
        <video id="liveRoomRemoteVideo" autoplay playsinline></video>
      </div>
      <div id="liveRoomLocalCard" class="video-card">
        <div class="video-label">Benim görüntüm</div>
        <video id="liveRoomLocalVideo" autoplay playsinline muted></video>
      </div>
    </div>

    <div id="liveRoomAdminBar" class="live-room-input hidden">
      <textarea id="liveRoomInput" placeholder="Yaz ve Enter ile gönder..."></textarea>
      <button id="liveRoomSendBtn" class="send-btn small">Gönder</button>
    </div>
  </div>
</div>

  <div id="imageModal" class="image-modal hidden" aria-hidden="true">
    <div id="imageModalBackdrop" class="image-modal-backdrop"></div>
    <div class="image-modal-panel" role="dialog" aria-modal="true" aria-label="Resim görüntüleyici">
      <div class="image-modal-top">
        <div id="imageModalTitle" class="image-modal-title">Resim</div>
        <button id="imageModalClose" class="image-modal-close" type="button">×</button>
      </div>
      <img id="imageModalImg" class="image-modal-image" alt="Büyütülmüş resim" />
      <div class="image-modal-actions">
        <button id="imageModalOpenNewTab" class="img-action-btn" type="button">Yeni Sekmede Aç</button>
        <button id="imageModalDownload" class="img-action-btn" type="button">İndir</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
    import {
      getFirestore,
      collection,

function canOpenCameraRequest() {
  try {
    if (!navigator.permissions?.query) return Promise.resolve(true);
  } catch {
    return Promise.resolve(true);
  }
  return Promise.allSettled([
    navigator.permissions.query({ name: "camera" }),
    navigator.permissions.query({ name: "microphone" })
  ]).then((results) => {
    for (const item of results) {
      if (item.status === "fulfilled" && item.value?.state === "denied") return false;
    }
    return true;
  }).catch(() => true);
}

function buildLiveRoomUrl(role, thread = selectedThread, sessionId = liveSessionId) {
  const params = new URLSearchParams();
  params.set("liveRoom", "1");
  params.set("role", role || "user");
  if (thread) params.set("thread", thread);
  if (sessionId) params.set("session", sessionId);
  if (currentUser) params.set("user", currentUser);
  return `${location.pathname}?${params.toString()}`;
}

function roomStopSpeech() {
  try { speechSynthesis.cancel(); } catch {}
}

function roomSpeak(text) {
  if (!text) return;
  try {
    initVoice();
    speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = "tr-TR";
    utter.voice = utteranceVoice || getVoice();
    utter.rate = 0.86;
    utter.pitch = 0.58;
    utter.volume = 1;
    speechSynthesis.speak(utter);
  } catch (err) {
    console.warn("Room ses çalışmadı:", err);
  }
}

  if (liveRoomUnsubTexts) liveRoomUnsubTexts();
  liveRoomUnsubSession = null;
  liveRoomUnsubCallerCandidates = null;
  liveRoomUnsubCalleeCandidates = null;
  liveRoomUnsubTexts = null;
}

async function roomStop() {
  roomClearListeners();

  if (liveRoomPC) {
    try { liveRoomPC.ontrack = null; liveRoomPC.onicecandidate = null; liveRoomPC.onconnectionstatechange = null; liveRoomPC.close(); } catch {}
  }
  liveRoomPC = null;

  if (liveRoomLocalStream) {
    liveRoomLocalStream.getTracks().forEach((t) => t.stop());
  }
  liveRoomLocalStream = null;

  if (liveRoomRemoteVideo) liveRoomRemoteVideo.srcObject = null;
  if (liveRoomLocalVideo) liveRoomLocalVideo.srcObject = null;
  liveRoomStarted = false;
}

async function roomFlushCandidates() {
  if (!liveRoomPC || !liveRoomPC.remoteDescription) return;
  const queue = liveRoomPendingRemoteCandidates.splice(0);
  for (const cand of queue) {
    try {
      await liveRoomPC.addIceCandidate(new RTCIceCandidate(cand));
    } catch (err) {
      console.warn("ICE eklenemedi:", err);
    }
  }
}

async function roomPreparePeer(isCaller) {
  liveRoomPC = new RTCPeerConnection({ iceServers: STUN_SERVERS });
  liveRoomPendingRemoteCandidates = [];
  liveRoomPendingLocalCandidates = [];

  liveRoomPC.ontrack = (event) => {
    const [stream] = event.streams;
    if (stream && liveRoomRemoteVideo) liveRoomRemoteVideo.srcObject = stream;
  };

  liveRoomPC.onconnectionstatechange = async () => {
    const state = liveRoomPC?.connectionState || "";
    if (state === "failed" || state === "disconnected" || state === "closed") {
      await roomStop();
    }
  };

  liveRoomPC.onicecandidate = async (event) => {
    if (!event.candidate || !liveRoomSessionId) return;
    try {
      const candidateData = event.candidate.toJSON();
      const collectionName = isCaller ? "callerCandidates" : "calleeCandidates";
      await addDoc(collection(db, "liveSessions", liveRoomSessionId, collectionName), candidateData);
    } catch (err) {
      console.warn("ICE kaydedilemedi:", err);
    }
  };
}

async function roomStartCaller() {
  if (liveRoomStarted || liveRoomRole !== "user") return;
  liveRoomStarted = true;
  updateLiveRoomUI("GloGeGo dinliyor...");
  try {
    liveRoomLocalStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    if (liveRoomLocalVideo) liveRoomLocalVideo.srcObject = liveRoomLocalStream;

    await roomPreparePeer(true);
    liveRoomLocalStream.getTracks().forEach((track) => liveRoomPC.addTrack(track, liveRoomLocalStream));

    const sessionRef = doc(db, "liveSessions", liveRoomSessionId);
    const calleeCandidatesRef = collection(db, "liveSessions", liveRoomSessionId, "calleeCandidates");

    const offer = await liveRoomPC.createOffer();
    await liveRoomPC.setLocalDescription(offer);

    await setDoc(sessionRef, {
      threadId: liveRoomThread || liveRoomUser || currentUser,
      caller: liveRoomUser || currentUser,
      callee: ADMIN_USER,
      status: "active",
      offer: { type: offer.type, sdp: offer.sdp },
      updatedAt: serverTimestamp()
    }, { merge: true });

    if (liveRoomUnsubSession) liveRoomUnsubSession();
    liveRoomUnsubSession = onSnapshot(sessionRef, async (snap) => {
      if (!snap.exists()) return;
      const data = snap.data() || {};
      if (data.answer && liveRoomPC && !liveRoomPC.currentRemoteDescription) {
        try {
          await liveRoomPC.setRemoteDescription(new RTCSessionDescription(data.answer));
          await roomFlushCandidates();
        } catch (err) {
          console.warn("Answer işlenemedi:", err);
        }
      }
      if (data.status === "ended") {
        await roomStop();
        updateLiveRoomUI("Canlı kapatıldı.");
      }
    });

    if (liveRoomUnsubCalleeCandidates) liveRoomUnsubCalleeCandidates();
    liveRoomUnsubCalleeCandidates = onSnapshot(calleeCandidatesRef, async (snap) => {
      snap.docChanges().forEach(async (change) => {
        if (change.type === "added") {
          const data = change.doc.data();
          if (!liveRoomPC || !liveRoomPC.remoteDescription) {
            liveRoomPendingRemoteCandidates.push(data);
          } else {
            try {
              await liveRoomPC.addIceCandidate(new RTCIceCandidate(data));
            } catch (err) {
              console.warn("ICE eklenemedi:", err);
            }
          }
        }
      });
      await roomFlushCandidates();
    });

    updateLiveRoomUI("GloGeGo dinliyor...");
  } catch (err) {
    console.error(err);
    updateLiveRoomUI(err?.message || "Canlı başlatılamadı.");
    await roomStop();
  }
}

async function initLiveRoomMode() {
  showLiveRoomScreen();
  liveRoomSessionId = liveRoomSessionParam || safeDocId(`live_${liveRoomThreadParam || liveRoomUserParam || "room"}`);
  liveRoomRole = liveRoomRoleParam === "admin" ? "admin" : "user";
  liveRoomThread = liveRoomThreadParam || "";
  liveRoomUser = liveRoomUserParam || liveRoomThreadParam || currentUser || "";

  currentUser = liveRoomUser || currentUser || (liveRoomRole === "admin" ? ADMIN_USER : "");
  isAdmin = liveRoomRole === "admin";

  if (liveRoomEndBtn) {
    liveRoomEndBtn.addEventListener("click", async () => {
      await roomStop();
      try {
        await updateDoc(doc(db, "liveSessions", liveRoomSessionId), {
          status: "ended",
          endedAt: serverTimestamp(),
          endedBy: currentUser || "system",
          updatedAt: serverTimestamp()
        });
      } catch {}
      updateLiveRoomUI("Canlı kapatıldı.");
    });
  }

  if (liveRoomSendBtn) {
    liveRoomSendBtn.addEventListener("click", roomSendText);
  }
  if (liveRoomInput) {
    liveRoomInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        roomSendText();
      }
    });
  }

  updateLiveRoomUI(liveRoomRole === "admin" ? "Karşı kamerayı bekliyor..." : "GloGeGo dinliyor...");

  const sessionRef = doc(db, "liveSessions", liveRoomSessionId);
  liveRoomUnsubSession = onSnapshot(sessionRef, async (snap) => {
    if (!snap.exists()) {
      updateLiveRoomUI("İstek bekleniyor...");
      return;
    }
    const data = snap.data() || {};
    if (liveRoomRole === "user") {
      if (data.status === "requesting") {
        updateLiveRoomUI("GloGeGo onayı bekleniyor...");
      } else if (data.status === "active") {
        updateLiveRoomUI("GloGeGo dinliyor...");
        if (!liveRoomStarted) {
          await roomStartCaller();
        }
      } else if (data.status === "ended") {
        await roomStop();
        updateLiveRoomUI("Canlı kapatıldı.");
      }
    } else {
      if (data.status === "requesting") {
        updateLiveRoomUI("Onay verildiğinde kamera açılacak.");
      } else if (data.status === "active") {
        if (!liveRoomStarted) {
          await roomStartAdmin();
        }
      } else if (data.status === "ended") {
        await roomStop();
        updateLiveRoomUI("Canlı kapatıldı.");
      }
    }
  });
}

function updateLiveUI() {

  const userMode = !isAdmin;

  liveBtn.classList.toggle("hidden", !userMode);
  liveAcceptBtn.classList.toggle("hidden", !(isAdmin && liveState === "requesting"));
  liveEndBtn.classList.toggle("hidden", liveState === "idle");

  if (userMode) {
    liveBtn.textContent = liveState === "idle" ? "Live" : "Live Kapat";
    liveBtn.classList.toggle("open", liveState !== "idle");
    liveBtn.classList.toggle("closed", liveState === "idle");
  } else {
    liveBtn.classList.remove("open", "closed");
  }

  livePill.classList.toggle("hidden", liveState === "idle");
  if (liveState === "requesting") {
    livePill.textContent = "Canlı istek";
    livePill.className = "pill";
    livePill.classList.remove("hidden");
  } else if (liveState === "active") {
    livePill.textContent = "Canlı açık";
    livePill.className = "pill online";
    livePill.classList.remove("hidden");
  }

  livePanel.classList.toggle("hidden", liveState === "idle");
  if (liveRemoteCard) liveRemoteCard.classList.toggle("hidden", !isAdmin);

  if (liveState === "requesting") {
    liveInfo.textContent = isAdmin
      ? `İstek geldi: ${selectedThread || "seçili sohbet"}`
      : "İstek gönderildi. GloGeGo kabul edince yeni canlı sekmesi açılır.";
    liveControlHint.textContent = isAdmin ? "Kabul edebilirsin." : "Kamera izni açık olmalı.";
  } else if (liveState === "active") {
    liveInfo.textContent = "Canlı bağlantı aktif.";
    liveControlHint.textContent = isAdmin ? "Görüntü açık, kamera kapalı." : "Görüntü ve ses gidiyor.";
  } else {
    liveInfo.textContent = "Hazır.";
    liveControlHint.textContent = "";
  }

  if (!hasThread && isAdmin) {
    liveInfo.textContent = "Bir kullanıcı seç.";
  }
}

    async function fileToImageElement(file) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(file);
        const img = new Image();
        img.onload = () => {
          URL.revokeObjectURL(url);
          resolve(img);
        };
        img.onerror = () => {
          URL.revokeObjectURL(url);
          reject(new Error("Resim yüklenemedi."));
        };
        img.src = url;
      });
    }

    async function compressImageToDataUrl(file) {
      const img = await fileToImageElement(file);
      let width = img.naturalWidth || img.width;
      let height = img.naturalHeight || img.height;
      if (!width || !height) throw new Error("Resim boyutu okunamadı.");

      const scale = Math.min(1, MAX_IMAGE_SIDE / Math.max(width, height));
      width = Math.max(1, Math.round(width * scale));
      height = Math.max(1, Math.round(height * scale));

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext("2d");
      if (!ctx) throw new Error("Canvas açılamadı.");
      ctx.drawImage(img, 0, 0, width, height);

      let quality = START_JPEG_QUALITY;
      let dataUrl = "";
      for (let i = 0; i < 4; i++) {
        dataUrl = canvas.toDataURL("image/jpeg", quality);
        if (dataUrl.length <= MAX_DATAURL_LENGTH) break;
        quality -= 0.09;
      }
      if (dataUrl.length > MAX_DATAURL_LENGTH) {
        throw new Error("Resim hâlâ çok büyük. Daha küçük bir resim yükle.");
      }

      return { dataUrl, width, height, mime: "image/jpeg" };
    }

        snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
        items.sort((a, b) => (a.createdAtClient || 0) - (b.createdAtClient || 0));

        for (const item of items) {

          seenLiveTextIds.add(item.id);

      if (!currentUser) return;
      try {
        await setDoc(doc(db, "presence", safeDocId(currentUser)), {
          username: currentUser,
          usernameKey: normalizeKey(currentUser),
          isAdmin,

        }, { merge: true });

        console.warn("Presence update skipped:", err);
      }

    function startPresenceTracking() {
      stopPresenceTracking();
      void markPresence(true);
      presenceTimer = setInterval(() => {
        if (document.visibilityState === "visible") {
          void markPresence(true);
        }
      }, PRESENCE_HEARTBEAT_MS);
      window.addEventListener("beforeunload", handleLeave, { once: true });
      window.addEventListener("pagehide", handleLeave, { once: true });
      document.addEventListener("visibilitychange", handleVisibility);
    }

    function stopPresenceTracking() {
      if (presenceTimer) clearInterval(presenceTimer);
      presenceTimer = null;
      document.removeEventListener("visibilitychange", handleVisibility);
    }

    function handleVisibility() {
      if (!currentUser) return;
      if (document.visibilityState === "visible") void markPresence(true);
      else void markPresence(false);
    }

    function handleLeave() {
      void markPresence(false);
    }

      if (unsubscribeLiveTexts) unsubscribeLiveTexts();
      if (unsubscribeCallerCandidates) unsubscribeCallerCandidates();
      if (unsubscribeCalleeCandidates) unsubscribeCalleeCandidates();
      unsubscribeLiveDoc = null;
      unsubscribeLiveTexts = null;
      unsubscribeCallerCandidates = null;
      unsubscribeCalleeCandidates = null;
    }

    async function endLiveSession(silent = false) {
      try {
        stopLiveListenersOnly();

        if (pc) {
          try { pc.ontrack = null; pc.onicecandidate = null; pc.onconnectionstatechange = null; pc.close(); } catch {}
        }
        pc = null;

        if (localStream) {
          localStream.getTracks().forEach(t => t.stop());
        }
        localStream = null;

        remoteVideo.srcObject = null;

        if (liveSessionId) {
          try {
            await updateDoc(doc(db, "liveSessions", liveSessionId), {
              status: "ended",
              endedAt: serverTimestamp(),
              endedBy: currentUser || "system",
              updatedAt: serverTimestamp()
            });
          } catch {}
        }
      } finally {
        liveSessionId = "";
        pendingRemoteCandidates = [];
        pendingLocalCandidates = [];
        seenLiveTextIds = new Set();
        if (liveState !== "idle") setLiveState("idle");
        if (!silent) updateLiveUI();
      }
    }

    async function preparePeer(isCaller) {
      pc = new RTCPeerConnection({ iceServers: STUN_SERVERS });
      pendingRemoteCandidates = [];
      pendingLocalCandidates = [];

      pc.ontrack = (event) => {
        const [stream] = event.streams;
        if (stream) remoteVideo.srcObject = stream;
      };

      pc.onconnectionstatechange = async () => {
        const state = pc?.connectionState || "";
        if (state === "failed" || state === "disconnected" || state === "closed") {
          if (liveState !== "idle") await endLiveSession();
        }
      };

      pc.onicecandidate = async (event) => {
        if (!event.candidate || !liveSessionId) return;
        try {
          const candidateData = event.candidate.toJSON();
          const targetCollection = isCaller ? "callerCandidates" : "calleeCandidates";
          await addDoc(collection(db, "liveSessions", liveSessionId, targetCollection), candidateData);
        } catch (err) {
          console.warn("ICE kaydedilemedi:", err);
        }
      };
    }

    async function flushQueuedCandidates() {
      if (!pc || !pc.remoteDescription) return;
      const queue = pendingRemoteCandidates.splice(0);
      for (const cand of queue) {
        try {
          await pc.addIceCandidate(new RTCIceCandidate(cand));
        } catch (err) {
          console.warn("ICE eklenemedi:", err);
        }
      }
    }

function listenLiveSession() {
  stopLiveListenersOnly();

  if (!selectedThread) {
    setLiveState("idle");
    updateLiveUI();
    return;
  }

  const sessionRef = doc(db, "liveSessions", safeDocId(`live_${selectedThread}`));
  unsubscribeLiveDoc = onSnapshot(sessionRef, async (snap) => {
    if (!snap.exists()) {
      if (liveState !== "idle") {
        await endLiveSession(true);
      } else {
        updateLiveUI();
      }
      return;
    }

    const data = snap.data() || {};
    liveSessionId = safeDocId(`live_${selectedThread}`);

    if (data.status === "requesting") {
      setLiveState("requesting");
      if (!isAdmin) {
        liveInfo.textContent = "İstek gönderildi. GloGeGo onayı bekleniyor.";
      } else {
        liveInfo.textContent = `Canlı isteği: ${selectedThread}`;
      }
    } else if (data.status === "active") {
      setLiveState("active");
      if (isAdmin) {
        liveInfo.textContent = "Canlı bağlantı aktif.";
      } else {
        liveInfo.textContent = "GloGeGo dinliyor...";
      }
    } else if (data.status === "ended") {
      await endLiveSession();
    }

    updateLiveUI();
  });
}

    async function cleanupExpiredMessages() {
      try {
        const now = Timestamp.now();
        const q = query(collection(db, "messages"), where("expiresAt", "<=", now));
        const snap = await getDocs(q);
        for (const d of snap.docs) {
          await deleteDoc(doc(db, "messages", d.id));

        console.warn("Cleanup skipped:", err);

    function listenMessages() {
      if (unsubscribeMessages) unsubscribeMessages();
      messagesHydrated = false;
      seenMessageIds = new Set();
      messagesEl.innerHTML = `<div class="empty">Yükleniyor...</div>`;

      const threadId = isAdmin ? selectedThread : currentUser;
      if (!threadId) {
        renderEmpty("Bir sohbet seç.");
        return;
      }

      const q = query(collection(db, "messages"), where("threadId", "==", threadId));
      unsubscribeMessages = onSnapshot(q, (snap) => {
        const items = [];
        snap.forEach((d) => items.push({ id: d.id, ...d.data() }));
        items.sort((a, b) => (a.createdAtClient || 0) - (b.createdAtClient || 0));

        if (!items.length) {
          renderEmpty("Henüz mesaj yok.");
          return;
        }

        if (!messagesHydrated) {
          items.forEach(item => seenMessageIds.add(item.id));
          messagesHydrated = true;
        } else if (!isAdmin) {
          for (const item of items) {
            const isNew = !seenMessageIds.has(item.id);
            if (isNew) {
              seenMessageIds.add(item.id);
            }
          }
        }

        messagesEl.innerHTML = items.map(renderMessage).join("");

        messagesEl.querySelectorAll(".copy-btn").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const text = decodeURIComponent(btn.dataset.copy || "");
            await copyText(text, btn);
          });
        });

        messagesEl.querySelectorAll("[data-open-image]").forEach((btn) => {
          btn.addEventListener("click", () => openImageModal(btn.dataset.openImage || "", btn.dataset.imageName || "Resim"));
        });

        messagesEl.querySelectorAll("[data-download-image]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            await downloadDataUrl(btn.dataset.downloadImage || "", btn.dataset.imageName || "resim.jpg");
          });
        });

        messagesEl.querySelectorAll(".message-image").forEach((img) => {
          img.addEventListener("click", () => {
            openImageModal(img.dataset.imageUrl || "", img.dataset.imageName || "Resim");
          });
        });

        requestAnimationFrame(scrollToBottomFast);
      }, () => {
        renderEmpty("Mesajlar yüklenemedi.");
      });
    }

    function listenThreads() {
      if (unsubscribeThreads) unsubscribeThreads();

      const q = query(collection(db, "messages"), orderBy("createdAtClient", "desc"));
      unsubscribeThreads = onSnapshot(q, (snap) => {
        const latestByUser = new Map();
        snap.forEach((d) => {
          const data = d.data();
          if (!data.threadId) return;
          if (data.sender === ADMIN_USER) return;
          if (!latestByUser.has(data.threadId)) {
            latestByUser.set(data.threadId, data);
          }
        });

        lastThreadsCache = Array.from(latestByUser.entries()).map(([thread, data]) => ({ thread, data }));

        if (!selectedThread && lastThreadsCache.length) {
          selectedThread = lastThreadsCache[0].thread;
          listenMessages();
          listenLiveSession();
        }

        renderThreadList();
        updateThreadStatusPill();
      });
    }

    function listenPresence() {
      if (unsubscribePresence) unsubscribePresence();

      unsubscribePresence = onSnapshot(collection(db, "presence"), (snap) => {
        const map = new Map();
        snap.forEach((d) => {
          const data = d.data() || {};
          const key = normalizeKey(data.username || data.usernameKey || d.id);
          map.set(key, { ...data, _id: d.id });
        });
        presenceMap = map;
        renderThreadList();
        updateThreadStatusPill();
      }, () => {
        presenceMap = new Map();
        renderThreadList();
        updateThreadStatusPill();
      });
    }

    function listenStatus() {
      if (unsubscribeStatus) unsubscribeStatus();

      unsubscribeStatus = onSnapshot(statusDocRef, async (snap) => {
        chatOpen = snap.exists() ? (snap.data()?.open !== false) : true;
        updateComposerState();
      }, async () => {
        chatOpen = true;
        updateComposerState();
      });
    }

    loginBtn.addEventListener("click", login);
    passwordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    usernameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") login(); });
    logoutBtn.addEventListener("click", logout);

    sendBtn.addEventListener("click", sendMessage);
    scrollBottomBtn.addEventListener("click", scrollToBottomFast);
    statusToggleBtn.addEventListener("click", toggleChatStatus);

    liveBtn.addEventListener("click", async () => {
      if (liveState === "idle") await startLiveAsCaller();
      else await endLiveSession();
    });

    liveAcceptBtn.addEventListener("click", async () => {
      if (!isAdmin || !selectedThread) return;
      const sessionRef = doc(db, "liveSessions", safeDocId(`live_${selectedThread}`));
      const snap = await getDoc(sessionRef);
      const data = snap.exists() ? snap.data() : null;
      if (data?.offer) {
        await acceptLiveAsAdmin(data);
      } else {
        alert("Canlı isteği bulunamadı.");
      }
    });

    liveEndBtn.addEventListener("click", async () => {
      await endLiveSession();
    });

    imageBtn.addEventListener("click", () => {
      if (imageBtn.disabled) return;
      imageInput.click();
    });

    imageInput.addEventListener("change", () => {
      const file = imageInput.files && imageInput.files[0];
      if (file) sendImage(file);
    });

    messageInput.addEventListener("input", () => {
      charCount.textContent = String(messageInput.value.length);
    });

    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        sendMessage();
      }
    });

    imageModalBackdrop.addEventListener("click", closeImageModal);
    imageModalClose.addEventListener("click", closeImageModal);

    imageModalOpenNewTab.addEventListener("click", () => {
      if (currentModalImageUrl) {
        window.open(currentModalImageUrl, "_blank", "noopener,noreferrer");
      }
    });

    imageModalDownload.addEventListener("click", async () => {
      if (currentModalImageUrl) {
        await downloadDataUrl(currentModalImageUrl, currentModalImageName || "resim.jpg");
      }
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && !imageModal.classList.contains("hidden")) {
        closeImageModal();
      }
    });


if (isLiveRoomPage) {
  initLiveRoomMode();
} else if (loadSession()) {
  showApp();
} else {
  showLogin();
}

// Make sure UI reflects selected role immediately.
if (!isLiveRoomPage) {
  updateComposerState();
}
  </script>
</body>
</html>
